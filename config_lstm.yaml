# config_lstm.yaml
seed: 42
data:
  unobserved_proportion: 0.2
  h: 24
  N_sub: 25
  u: 1
  train_sample_size: 2000
  val_sample_size: 2000
  test_sample_size: 20000
model:
  name: "LSTM"
  params:
    num_nodes: 25
    num_timesteps: 24
    aux_dim: 11
    lstm_hidden: 64
    lstm_layers: 2
    dropout: 0.0
loss:
  name: "L1Loss"
  params:
    reduction: "mean"
training:
  epochs: 500
  batch_size: 128
  lr: 0.001
  early_stopping_patience: 20
  min_delta: 0.0001
  lr_scheduler: true
  patience_lr: 20
  factor_lr: 0.5
paths:
  save_path: "./checkpoints/best_model_lstm.pth"
  log_dir: "./logs/lstm"
device: "cuda:0"
